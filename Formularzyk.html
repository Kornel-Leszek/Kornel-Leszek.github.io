<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Formularzyk</title>
<style>
    body {
        font-family: Arial;
        padding: 20px;
    }
    .error {
        color: red;
    }
    .invalid {
        border: 2px solid red;
    }
</style>
</head>
<body>

<form id="form1">
    <input type="text" id="textInput" placeholder="Wpisz coś">
    <button type="submit">Wyślij</button>
    <br><br>
    <label>
        <input type="checkbox" id="checkbox">
        Zgadzam się
    </label>
</form>

<p>Liczba znaków: <span id="charCount">0</span></p>

<input type="password" id="passwordInput" placeholder="Hasło (min. 8 znaków)">
<br><br>

<select id="colorSelect">
    <option value="">Wybierz kolor</option>
    <option value="lightblue">Niebieski</option>
    <option value="lightgreen">Zielony</option>
    <option value="lightcoral">Czerwony</option>
</select>


<form id="registerForm">
    <input type="text" id="email" placeholder="E-mail"><br><br>
    <input type="password" id="pass1" placeholder="Hasło"><br><br>
    <input type="password" id="pass2" placeholder="Powtórz hasło"><br><br>
    <button type="submit">Zarejestruj</button>
</form>

<p id="message" class="error"></p>

<script>

const form1 = document.getElementById("form1");
const textInput = document.getElementById("textInput");
const checkbox = document.getElementById("checkbox");

form1.addEventListener("submit", function(event) {
    event.preventDefault();

    console.log("Wartość inputa:", textInput.value);
    console.log("Checkbox zaznaczony:", checkbox.checked);
});

const charCount = document.getElementById("charCount");

textInput.addEventListener("input", function() {
    charCount.textContent = textInput.value.length;
});

const passwordInput = document.getElementById("passwordInput");

passwordInput.addEventListener("blur", function() {
    if (passwordInput.value.length < 8) {
        passwordInput.classList.add("invalid");
    } else {
        passwordInput.classList.remove("invalid");
    }
});

const colorSelect = document.getElementById("colorSelect");

colorSelect.addEventListener("change", function() {
    document.body.style.backgroundColor = colorSelect.value;
});

const registerForm = document.getElementById("registerForm");
const email = document.getElementById("email");
const pass1 = document.getElementById("pass1");
const pass2 = document.getElementById("pass2");
const message = document.getElementById("message");

registerForm.addEventListener("submit", function(event) {
    event.preventDefault();

    message.textContent = "";

    if (!email.value.includes("@")) {
        message.textContent = "Niepoprawny e-mail";
        return;
    }

    if (pass1.value !== pass2.value) {
        message.textContent = "Hasła nie są zgodne";
        return;
    }

    message.style.color = "green";
    message.textContent = "Rejestracja zakończona sukcesem!";
});

</script>

</body>
</html>
