    <h1>Zadanie 23 - Formatowanie Dowcipów o Programistach</h1>

    
    <p id="pogrubienie_kornel">Leszek: Dlaczego programista zawsze myśli o kawie? Bo bez niej nie jest w stanie skompilować swojego dnia!</p>

    <p id="pochylona_kornel">Leszek: Jak programista przygotowuje herbatę? Zaczyna od importu herbaty, a potem sprawdza, czy działa funkcja "zaparz".</p>

    <p id="index_gorny_kornel">Leszek: Czym różni się programista od detektywa? Detektyw szuka wskazówek, programista błędów.</p>

    <p id="index_dolny_kornel">Leszek: Jaki jest ulubiony język programisty? Pytanie nie ma sensu, programiści rozmawiają tylko w kodzie!</p>

    <p id="mono_kornel">Leszek: Dlaczego programiści nienawidzą przyjęć? Bo zawsze muszą obsługiwać nieoczekiwane wyjątki.</p>

    <p id="powiekszenie_kornel">Leszek: Jakie jest najtrudniejsze zadanie w życiu programisty? Odpalenie programu bez żadnych błędów w konsoli.</p>

    <p id="pomniejszenie_kornel">Leszek: Dlaczego programiści nie mogą jeść w restauracjach? Bo zawsze szukają błędów w menu.</p>
