<html>
<head>
<script type="text/javascript">
function wiezowiec(ile_pienter,ile_metrow,ile_schodow)//początek konstruktora
{
this.pientra=ile_pienter;
this.metry=ile_metrow;
this.schody=ile_schodow;
}//koniec konstruktora
wiezowiec.prototype.wypisz = function () //definicja metody
{
alert(this.pientra + ' ' + this.metry+ ' ' + this.schody);
};
var budynek1 = new wiezowiec("30 pięter", "200 metrów", "254 schodów"); // nowy obiekt osoba1
var budynek2 = new wiezowiec('7 pięter', '53 metrów', '407 schodów');
budynek1.wypisz(); // uruchomienie metody wypisz() dotyczącej osoby 1
budynek2.wypisz();
document.write("dostęp do właściwości"+"<br>");
// poniżej dostęp do pól osoby1
document.write("wiezowiec pierwszy"+" "+budynek1.pientra+" "+budynek1.metry+" "+budynek1.schody);
document.write("wiezowiec drugi"+" "+budynek2.pientra+" "+budynek2.metry+" "+budynek2.schody);
</script>
</head>
<body>
<br>
programowanie obiektowe
</body>
</html>
