<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>String JS</title>
</head>
<body>
<h2>Wycinanie i szukanie</h2>
Email:<br>
<input id="emailInput"><br><br>
Imię:<br>
<input id="nameInput"><br><br>
<button onclick="runTasks()">Uruchom</button>
<div id="output"></div>
<script>
function runTasks(){
let dane = "Kornel;Leszek;17;Gdańsk";
let nazwisko = dane.split(";")[1];
let email = document.getElementById("emailInput").value;
let czyPL = email.endsWith(".pl");
let zdanie = "Lubię lisy, bo wydają urocze dziwięki gdy się cieszą";
let noweZdanie = zdanie.replace("lisy","lisy polarne");
let imie = document.getElementById("nameInput").value;
let pierwszy = imie ? imie[0] : "-";
let ostatni = imie ? imie[imie.length-1] : "-";
document.getElementById("output").innerHTML =
"Nazwisko: " + nazwisko + "<br>" +
"Email kończy się na .pl: " + czyPL + "<br>" +
"Zdanie po zamianie: " + noweZdanie + "<br>" +
"Pierwsza litera imienia: " + pierwszy + "<br>" +
"Ostatnia litera imienia: " + ostatni;
}
</script>
</body>
</html>
