    <h1>Zadanie 22 - Arkusze styli i HTML</h1>

    <p>Jan Kowalski - Informatyka jest dziedziną, która stale się rozwija. Nowoczesne technologie pozwalają na tworzenie coraz bardziej zaawansowanych programów. Programowanie jest umiejętnością, która znajduje zastosowanie w wielu dziedzinach życia codziennego. Każdy informatyk musi znać podstawy algorytmiki i struktur danych.</p>

    <p id="gruby_kowalski">Jan Kowalski - Oprogramowanie komputerowe zmienia sposób, w jaki funkcjonujemy. Programiści tworzą aplikacje, które umożliwiają realizację różnorodnych zadań, od pracy biurowej po skomplikowane symulacje naukowe. Technologie webowe, jak HTML, CSS czy JavaScript, stanowią fundamenty rozwoju współczesnych stron internetowych. Zrozumienie tych technologii jest kluczowe w dzisiejszym świecie IT.</p>

    <h1 id="dlawszyskich_kowalski">Jan Kowalski - Nowoczesne technologie komputerowe nieustannie zmieniają nasze życie. Od prostych aplikacji mobilnych po zaawansowane systemy sztucznej inteligencji, które wspomagają decyzje biznesowe. Programowanie staje się jedną z najważniejszych umiejętności w XXI wieku. Nauka o komputerach ma ogromny wpływ na postęp technologiczny, a programiści są w centrum tego procesu.</h1>

    <div id="dlawszyskich_kowalski">Jan Kowalski - Współczesne systemy informacyjne zdominowały wiele branż. Informatyka nie ogranicza się już tylko do rozwoju oprogramowania, ale obejmuje także zagadnienia związane z zarządzaniem danymi, sieciami komputerowymi i bezpieczeństwem IT. Kluczowe znaczenie ma umiejętność rozwiązywania problemów oraz tworzenia efektywnych algorytmów. Wkrótce rola komputerów będzie jeszcze bardziej kluczowa, a ich aplikacje coraz bardziej złożone.</div>
