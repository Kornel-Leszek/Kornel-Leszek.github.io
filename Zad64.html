<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadanie 20</title>
    <style>
        #blok1 {
            background-color: #FFFDD0;
            width: 40%;
            height: 100%;
            padding: 20px;
        }
        #blok1 p {
            color: orange;
            font-size: 20pt;
            font-family: Arial, sans-serif;
        }
        #blok2 {
            background-color: #FF00FF;
            width: 15%;
            height: 80%;
            padding: 20px;
        }
        #blok2 i {
            color: green;
            font-size: 20pt;
            font-weight: bold;
        }
        #blok2 strike {
            color: red;
            font-size: 20pt;
        }
        #blok2 u {
            color: purple;
            font-size: 20pt;
            text-decoration: overline;
        }

        #blok3 {
            background-color: #00FF00;
            width: 30%;
            height: 100%;
            padding: 20px;
        }
        #blok3 h1 {
            color: blue;
            font-size: 30pt;
            text-decoration: underline;
        }
        #blok3 ol {
            font-size: 25pt;
            list-style-type: decimal;
        }
        #blok3 ol li {
            color: blue;
        }
        #blok3 ol li li {
            color: red;
            font-size: 20pt;
        }
        #blok3 ol li li li {
            color: gray;
            font-size: 15pt;
        }
    </style>
</head>
<body>+
    <div id="blok1">
    </div>

    <div id="blok2">
        <p>
        </p>
    </div>

    <div id="blok3">
    </div>
</body>
</html>
