<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Oferty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛍️ Moje Bransoletki</h1>
</header>

<section class="offers">

    <div class="card">
        <img src="https://www.vinted.pl/items/8761880953-bransoletka" alt="Bransoletka 1">

        <div class="card-content">
            <h2>Bransoletka</h2>
            <span class="price">10 zł</span>

            <a href="#" class="btn-card">
                Zobacz ofertę
            </a>
        </div>
    </div>

    <div class="card">
        <img src="https://www.vinted.pl/items/8761711650-pierscionek" alt="Pierścionek 1">

        <div class="card-content">
            <h2>Pierścionek</h2>
            <span class="price">5 zł</span>

            <a href="#" class="btn-card">
                Zobacz ofertę
            </a>
        </div>
    </div>

    <div class="card">
        <img src="https://www.vinted.pl/items/8615235261-naszyjnik" alt="Naszyjnik 1">

        <div class="card-content">
            <h2>Naszyjnik</h2>


            <span class="price">15 zł</span>

            <a href="#" class="btn-card">
                Zobacz ofertę
            </a>
        </div>
    </div>

</section>

</body>
</html>
