<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Formatowanie z użyciem CSS</title>
    <style type="text/css">
        body {
            background-color: rgb(200, 250, 255);
            text-align: center;
            margin: 50px;
        }

        div {
            background: rgb(100, 128, 255); /* Kolor tła dla div */
            width: 400px;
            border: 3px black solid;
            margin: 0 auto;
        }

        h1 {
            margin: 20px;
            padding: 10px;
            background: rgb(255, 255, 0);
            border-top: 2px dotted red;
            border-bottom: 2px dashed green;
            border-left: 2px solid blue;
            border-right: 2px double purple;
        }


        h2 {
            width: 350px;
            height: 100px;
            padding: 20px;
            margin: 20px auto;
            background: rgb(255, 255, 150);
            border-top: 4px groove orange;
            border-bottom: 4px solid yellow;
            border-left: 4px ridge green;
            border-right: 4px inset blue;
        }

        h3 {
            width: 350px;
            height: 80px;
            padding: 10px;
            margin: 20px auto;
            background: rgb(255, 200, 200);
            border: 3px solid purple;
        }

        hr {
            margin: 20px auto;
            width: 50%;
        }

        .hr1 {
            border: 2px solid red;
            width: 80%;
        }
        .hr2 {
            border: 4px dashed green;
            width: 60%;
        }
        .hr3 {
            border: 5px double blue;
            width: 40%;
        }
    </style>
</head>
<body>

    <div>
        <h1>Leszek, 1P</h1>
    </div>

    <hr class="hr1">
    <hr class="hr2">
    <hr class="hr3">

    <h2>Witam na stronie!</h2>
    <h3>Opis zadania z CSS</h3>
</body>
</html>
