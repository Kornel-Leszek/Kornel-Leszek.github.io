<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KL</title>
    <style>
        body {
            margin: 0px;
            border: 0px;
            padding: 0px;
        }

        .blok {
            background-color: #ffff99; /* Jasne tło */
            border: 5px solid black;
            color: red;
            font-size: 42px;
            width: 900px;
            height: 150px;
            margin: 20px auto;
            text-align: center;
            line-height: 150px;
        }
    </style>
</head>
<body>

    <!-- Powtarzanie w obu kierunkach -->
    <div class="blok" style="background-image: url('inicial_kl.png'); background-repeat: repeat;">
        Powtarzanie grafiki dla całego obszaru
    </div>

    <!-- Powtarzanie w pionie -->
    <div class="blok" style="background-image: url('inicial_kl.png'); background-repeat: repeat-y;">
        Powtarzanie grafiki w pionie
    </div>

    <!-- Powtarzanie w poziomie -->
    <div class="blok" style="background-image: url('inicial_kl.png'); background-repeat: repeat-x;">
        Powtarzanie grafiki w poziomie
    </div>

    <!-- Grafika centrowana o zadanej wielkości -->
    <div class="blok" style="
        background-image: url('inicial_kl.png');
        background-repeat: no-repeat;
        background-size: 400px 120px;
        background-position: center;">
        Grafika centrowana o zadanej wielkości
    </div>

</body>
</html>
<!-- Kornel Leszek -->
